<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cálculo con Day 📚</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a26;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --correct: #10b981;
    --wrong: #ef4444;
    --border: rgba(124,58,237,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(6,182,212,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(124,58,237,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
    animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1);
  }

  .logo {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 0 24px rgba(124,58,237,0.4);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Topic selector */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .topic-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  .topic-btn .icon { font-size: 20px; display: block; margin-bottom: 8px; }
  .topic-btn .name { font-weight: 700; font-size: 13px; display: block; margin-bottom: 3px; }
  .topic-btn .desc { color: var(--muted); font-size: 11px; }

  .topic-btn:hover, .topic-btn.active {
    border-color: var(--accent);
    background: rgba(124,58,237,0.15);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(124,58,237,0.2);
  }

  .topic-btn.active { border-color: var(--accent2); }

  /* Difficulty */
  .diff-row {
    display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap;
  }

  .diff-btn {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .diff-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .diff-btn.active { background: var(--accent3); border-color: var(--accent3); color: #000; font-weight: 700; }

  /* Generate btn */
  .gen-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #5b21b6);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    margin-bottom: 28px;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }

  .gen-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(124,58,237,0.5);
  }

  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    margin-bottom: 20px;
    animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1);
    display: none;
  }

  .question-card.visible { display: block; }

  .q-label {
    font-size: 11px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .q-text {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 24px;
    color: var(--text);
  }

  /* Answer input */
  .answer-area {
    display: flex; gap: 10px; flex-wrap: wrap;
  }

  .answer-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .answer-input:focus { border-color: var(--accent2); }
  .answer-input::placeholder { color: var(--muted); }

  .check-btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--accent2), #0891b2);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .check-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(6,182,212,0.4); }
  .check-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Hint btn */
  .hint-btn {
    padding: 12px 18px;
    background: transparent;
    border: 1.5px solid rgba(245,158,11,0.4);
    border-radius: 10px;
    color: var(--accent3);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .hint-btn:hover { background: rgba(245,158,11,0.1); }

  /* Feedback */
  .feedback-card {
    border-radius: 14px;
    padding: 20px 24px;
    margin-top: 16px;
    animation: fadeUp 0.4s ease;
    display: none;
    border: 1.5px solid;
  }

  .feedback-card.visible { display: block; }
  .feedback-card.correct { border-color: var(--correct); background: rgba(16,185,129,0.08); }
  .feedback-card.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.08); }
  .feedback-card.hint { border-color: var(--accent3); background: rgba(245,158,11,0.08); }

  .feedback-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    margin-bottom: 10px;
  }

  .correct .feedback-title { color: var(--correct); }
  .wrong .feedback-title { color: var(--wrong); }
  .hint .feedback-title { color: var(--accent3); }

  .feedback-text {
    font-size: 13px;
    line-height: 1.8;
    color: #c0c0d8;
    white-space: pre-wrap;
  }

  /* Score */
  .score-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .score-item {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
  }

  .score-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  .score-dot.c { background: var(--correct); }
  .score-dot.w { background: var(--wrong); }

  .score-num { font-weight: 700; font-family: 'Syne', sans-serif; font-size: 18px; }
  .score-num.c { color: var(--correct); }
  .score-num.w { color: var(--wrong); }

  .streak { margin-left: auto; font-size: 13px; color: var(--accent3); }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  /* Animations */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .next-btn {
    margin-top: 16px;
    padding: 12px 28px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .next-btn.visible { display: inline-block; }
  .next-btn:hover { border-color: var(--accent); background: rgba(124,58,237,0.15); }

  .mode-toggle {
    display: flex; gap: 8px; margin-bottom: 28px;
  }

  .mode-btn {
    flex: 1; padding: 12px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .mode-btn.active { border-color: var(--accent); color: var(--text); background: rgba(124,58,237,0.2); }

  @media (max-width: 520px) {
    h1 { font-size: 22px; }
    .q-text { font-size: 16px; }
    .topics-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">

  <div class="header">
    <div class="logo">∫</div>
    <div>
      <h1>CÁLCULO STUDY</h1>
      <div class="subtitle">Repaso interactivo con IA · Para Day 📚</div>
    </div>
  </div>

  <!-- Score -->
  <div class="score-bar">
    <div class="score-item">
      <div class="score-dot c"></div>
      <span>Correctas:</span>
      <span class="score-num c" id="scoreCorrect">0</span>
    </div>
    <div class="score-item">
      <div class="score-dot w"></div>
      <span>Incorrectas:</span>
      <span class="score-num w" id="scoreWrong">0</span>
    </div>
    <div class="streak" id="streakDisplay">🔥 Racha: 0</div>
  </div>

  <!-- Mode -->
  <div class="section-title">Modo de estudio</div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('ejercicio')" id="modeEjercicio">🧮 Ejercicios</button>
    <button class="mode-btn" onclick="setMode('explicacion')" id="modeExplicacion">📖 Explicación</button>
    <button class="mode-btn" onclick="setMode('quiz')" id="modeQuiz">⚡ Quiz rápido</button>
  </div>

  <!-- Topics -->
  <div class="section-title">Tema a repasar</div>
  <div class="topics-grid">
    <button class="topic-btn active" onclick="selectTopic(this,'limites')" id="topic-limites">
      <span class="icon">🎯</span>
      <span class="name">Límites</span>
      <span class="desc">lim x→a f(x)</span>
    </button>
    <button class="topic-btn" onclick="selectTopic(this,'derivadas')" id="topic-derivadas">
      <span class="icon">📈</span>
      <span class="name">Derivadas</span>
      <span class="desc">f'(x) = dy/dx</span>
    </button>
    <button class="topic-btn" onclick="selectTopic(this,'integrales')" id="topic-integrales">
      <span class="icon">∫</span>
      <span class="name">Integrales</span>
      <span class="desc">∫f(x)dx</span>
    </button>
    <button class="topic-btn" onclick="selectTopic(this,'regla cadena')" id="topic-regla cadena">
      <span class="icon">🔗</span>
      <span class="name">Regla de la cadena</span>
      <span class="desc">d/dx[f(g(x))]</span>
    </button>
    <button class="topic-btn" onclick="selectTopic(this,'continuidad')" id="topic-continuidad">
      <span class="icon">〰️</span>
      <span class="name">Continuidad</span>
      <span class="desc">f continua en a</span>
    </button>
    <button class="topic-btn" onclick="selectTopic(this,'teorema fundamental')" id="topic-teorema fundamental">
      <span class="icon">🏆</span>
      <span class="name">Teorema Fundamental</span>
      <span class="desc">d/dx ∫f = f(x)</span>
    </button>
  </div>

  <!-- Difficulty -->
  <div class="section-title">Dificultad</div>
  <div class="diff-row">
    <button class="diff-btn active" onclick="selectDiff(this,'básico')">🌱 Básico</button>
    <button class="diff-btn" onclick="selectDiff(this,'intermedio')">🔥 Intermedio</button>
    <button class="diff-btn" onclick="selectDiff(this,'difícil')">💀 Difícil</button>
  </div>

  <!-- Generate -->
  <button class="gen-btn" id="genBtn" onclick="generateQuestion()">
    ✨ GENERAR PREGUNTA
  </button>

  <!-- Question card -->
  <div class="question-card" id="questionCard">
    <div class="q-label" id="qLabel">EJERCICIO · LÍMITES · BÁSICO</div>
    <div class="q-text" id="qText">La pregunta aparecerá aquí...</div>
    <div class="answer-area" id="answerArea">
      <input type="text" class="answer-input" id="answerInput" placeholder="Escribe tu respuesta..." onkeydown="if(event.key==='Enter') checkAnswer()"/>
      <button class="check-btn" id="checkBtn" onclick="checkAnswer()">Verificar →</button>
      <button class="hint-btn" onclick="getHint()">💡 Pista</button>
    </div>
    <div class="feedback-card" id="feedbackCard">
      <div class="feedback-title" id="feedbackTitle"></div>
      <div class="feedback-text" id="feedbackText"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="generateQuestion()">Siguiente pregunta →</button>
  </div>

</div>

<script>
let selectedTopic = 'limites';
let selectedDiff = 'básico';
let currentMode = 'ejercicio';
let currentQuestion = '';
let score = { correct: 0, wrong: 0, streak: 0 };
let waitingForCheck = false;

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
}

function selectTopic(btn, topic) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTopic = topic;
}

function selectDiff(btn, diff) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedDiff = diff;
}

function setLoading(on) {
  const btn = document.getElementById('genBtn');
  btn.disabled = on;
  btn.innerHTML = on 
    ? '<span class="spinner"></span> Generando...' 
    : '✨ GENERAR PREGUNTA';
}

function updateScore() {
  document.getElementById('scoreCorrect').textContent = score.correct;
  document.getElementById('scoreWrong').textContent = score.wrong;
  document.getElementById('streakDisplay').textContent = `🔥 Racha: ${score.streak}`;
}

async function callClaude(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}

async function generateQuestion() {
  setLoading(true);
  hideFeedback();
  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('answerInput').value = '';
  document.getElementById('checkBtn').disabled = false;
  waitingForCheck = false;

  let prompt;
  if (currentMode === 'ejercicio') {
    prompt = `Eres un tutor de cálculo. Genera UN ejercicio de nivel ${selectedDiff} sobre ${selectedTopic} para un estudiante universitario de primer año. 
El ejercicio debe ser concreto y resoluble (incluye números específicos).
Devuelve SOLO el enunciado del ejercicio, sin solución, sin explicación adicional. Máximo 2-3 líneas. En español.`;
  } else if (currentMode === 'explicacion') {
    prompt = `Eres un tutor de cálculo. Explica el concepto de ${selectedTopic} de forma clara, entretenida y con un ejemplo concreto.
Nivel: ${selectedDiff}. Máximo 8 líneas. En español. Usa emojis ocasionalmente para hacer más visual la explicación.`;
  } else {
    prompt = `Eres un tutor de cálculo. Genera UNA pregunta teórica tipo quiz (opción múltiple o verdadero/falso) de nivel ${selectedDiff} sobre ${selectedTopic}.
Incluye las opciones. Devuelve SOLO la pregunta y opciones, sin respuesta. En español.`;
  }

  try {
    const question = await callClaude(prompt);
    currentQuestion = question;

    const card = document.getElementById('questionCard');
    card.classList.add('visible');
    document.getElementById('qLabel').textContent = 
      `${currentMode.toUpperCase()} · ${selectedTopic.toUpperCase()} · ${selectedDiff.toUpperCase()}`;
    document.getElementById('qText').textContent = question;

    const answerArea = document.getElementById('answerArea');
    if (currentMode === 'explicacion') {
      answerArea.style.display = 'none';
      document.getElementById('nextBtn').classList.add('visible');
      document.getElementById('nextBtn').textContent = 'Siguiente explicación →';
    } else {
      answerArea.style.display = 'flex';
      document.getElementById('nextBtn').textContent = 'Siguiente pregunta →';
      setTimeout(() => document.getElementById('answerInput').focus(), 100);
    }
  } catch(e) {
    alert('Error al conectar con la IA. Intenta de nuevo.');
  }

  setLoading(false);
}

async function checkAnswer() {
  if (waitingForCheck) return;
  const answer = document.getElementById('answerInput').value.trim();
  if (!answer) return;

  document.getElementById('checkBtn').disabled = true;
  waitingForCheck = true;

  const prompt = `Eres un tutor de cálculo. El estudiante respondió a este ejercicio:

EJERCICIO: ${currentQuestion}

RESPUESTA DEL ESTUDIANTE: ${answer}

Evalúa si la respuesta es correcta o no. 
- Empieza con "✅ CORRECTO" o "❌ INCORRECTO"
- Explica brevemente por qué (máximo 4 líneas)
- Si es incorrecto, muestra el procedimiento correcto paso a paso
- Sé amable y motivador. En español.`;

  try {
    const feedback = await callClaude(prompt);
    const isCorrect = feedback.startsWith('✅');

    if (isCorrect) {
      score.correct++; score.streak++;
      showFeedback('correct', '¡Excelente! 🎉', feedback);
    } else {
      score.wrong++; score.streak = 0;
      showFeedback('wrong', 'No del todo...', feedback);
    }
    updateScore();
    document.getElementById('nextBtn').classList.add('visible');
  } catch(e) {
    alert('Error. Intenta de nuevo.');
    document.getElementById('checkBtn').disabled = false;
  }
}

async function getHint() {
  const prompt = `Eres un tutor de cálculo. Da UNA pista (sin revelar la respuesta) para este ejercicio:
${currentQuestion}
La pista debe ser breve (máximo 2 líneas) y útil. En español. Empieza con "💡 Pista:"`;

  try {
    const hint = await callClaude(prompt);
    showFeedback('hint', '💡 Pista', hint);
  } catch(e) {}
}

function showFeedback(type, title, text) {
  const card = document.getElementById('feedbackCard');
  card.className = `feedback-card ${type} visible`;
  document.getElementById('feedbackTitle').textContent = title;
  document.getElementById('feedbackText').textContent = text;
}

function hideFeedback() {
  document.getElementById('feedbackCard').className = 'feedback-card';
}
</script>
</body>
</html>
